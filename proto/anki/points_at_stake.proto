// ReadyMCAT engine extension.
//
// The points-at-stake queue ranks due review cards by
//   points_at_stake = topic_weight * student_weakness
// where topic_weight is the AAMC content-distribution weight for the card's
// topic and student_weakness is 1 - (mean FSRS recall probability over every
// card in that topic). The same call also returns the three honest dashboard
// scores — Memory, Performance and Readiness — plus the per-topic
// memory/weakness aggregation and outline coverage, which the desktop dashboard
// consumes (each score obeying its own give-up rule):
//
//   * Memory      — mean FSRS recall over graded cards, as a 95% range.
//   * Performance — first-attempt accuracy on the ReadyMCAT question notetypes
//                   (MCQ / FreeResponse / Passage) read from the review log, as
//                   a Wilson 95% range.
//   * Readiness   — a documented, HEURISTIC (uncalibrated) projection onto the
//                   real MCAT 472–528 scale, blended from Performance and
//                   Memory and widened by coverage gaps.

syntax = "proto3";

option java_multiple_files = true;

package anki.points_at_stake;

service PointsAtStakeService {
  // Compute the points-at-stake ranked review queue plus the per-topic
  // mastery/weakness aggregation, overall memory range and coverage map.
  rpc PointsAtStakeQueue(PointsAtStakeRequest) returns (PointsAtStakeResponse);
}

// Backend-only counterpart (required so service indices stay paired). Empty:
// every method is delegated to the Collection implementation.
service BackendPointsAtStakeService {}

message PointsAtStakeRequest {
  // Path to taxonomy.json. When empty, the file is looked up next to the
  // collection (collection folder, then media folder).
  string taxonomy_path = 1;
  // Restrict ranking to due cards in this deck and its children. 0 = whole
  // collection.
  int64 deck_id = 2;
  // Maximum number of ranked cards to return. 0 = no limit.
  uint32 limit = 3;
}

message PointsAtStakeResponse {
  // Due review cards, highest points-at-stake first.
  repeated RankedCard ranked_cards = 1;
  // Per-AAMC-category mastery/weakness aggregation (sorted by category id).
  repeated TopicMastery topics = 2;
  // Honest overall memory score, always a range.
  MemoryReport memory = 3;
  // How much of the AAMC outline the deck covers.
  CoverageReport coverage = 4;
  // True when there is enough evidence to show the MEMORY score
  // (>= 200 graded reviews AND >= 50% topic coverage). Kept as the memory
  // give-up flag for backwards compatibility; performance and readiness carry
  // their own thresholds.
  bool meets_data_threshold = 5;
  // Honest performance score: first-attempt accuracy on ReadyMCAT question
  // cards, always a range with its own give-up rule.
  PerformanceReport performance = 6;
  // Heuristic (uncalibrated) readiness projection onto the 472–528 scale, with
  // its own give-up rule. Never presented as calibrated.
  ReadinessReport readiness = 7;
}

message RankedCard {
  int64 card_id = 1;
  // AAMC category id, e.g. "1A". Empty when the card maps to no topic.
  string category = 2;
  double topic_weight = 3;
  // The weakness used for ranking: the precision-weighted blend of the
  // first-launch diagnostic prior and the FSRS weakness. Equals fsrs_weakness
  // when no prior applies, so points_at_stake == topic_weight *
  // student_weakness for non-struggling cards.
  double student_weakness = 4;
  // topic_weight * student_weakness, already including the struggling boost.
  double points_at_stake = 5;
  // True when the card carries the ReadyMCAT::struggling tag (a teach-on-miss
  // correction that was missed again). Such cards get a priority boost so the
  // corrected concept resurfaces; points_at_stake already reflects it.
  bool struggling = 6;
  // Honest FSRS-only weakness (1 - mean recall). Matches the dashboard's
  // TopicMastery; the diagnostic prior NEVER changes it.
  double fsrs_weakness = 7;
  // The diagnostic prior's weakness seed for this category (equals
  // fsrs_weakness when no prior applies). Exposed so ordering is explainable.
  double prior_weakness = 8;
  // Whether a first-launch diagnostic prior contributed to student_weakness.
  // Ordering only — the dashboard's honest scores are unaffected either way.
  bool seeded_by_prior = 9;
}

message TopicMastery {
  // AAMC category id, e.g. "1A".
  string category = 1;
  string name = 2;
  double topic_weight = 3;
  // Cards mapped to this topic that have an FSRS memory state.
  uint32 graded_cards = 4;
  // All cards mapped to this topic.
  uint32 total_cards = 5;
  // Mean FSRS recall probability across graded cards (0..1). This is mastery.
  double mean_retrievability = 6;
  // 1 - mean_retrievability (0..1). This is weakness.
  double student_weakness = 7;
}

message MemoryReport {
  // Mean recall probability across all graded cards (0..1).
  double mean = 1;
  // 95% interval for the mean (0..1). The dashboard shows this range, never the
  // bare mean.
  double range_low = 2;
  double range_high = 3;
  // Number of graded reviews in the review log (drives the give-up rule).
  uint32 graded_reviews = 4;
  // Number of cards with an FSRS memory state contributing to the score.
  uint32 graded_cards = 5;
}

message CoverageReport {
  uint32 categories_total = 1;
  uint32 categories_covered = 2;
  // Fraction of AAMC categories covered by card count (0..1).
  double fraction = 3;
  // Fraction of exam weight covered (0..1).
  double weighted_fraction = 4;
}

// Honest "chance of getting a NEW exam-style question right": first-attempt
// accuracy on the ReadyMCAT question notetypes (MCQ / FreeResponse / Passage),
// read from the review log. A card's FIRST graded review is its first attempt;
// grade Good/Easy (ease >= 3) is a hit, Again/Hard is a miss — mirroring the
// reviewer's teach-on-miss grading (first-try -> Good, wrong/after-ladder ->
// Again). Presented as a Wilson 95% interval, never a bare number.
message PerformanceReport {
  // First-attempt accuracy across ReadyMCAT question cards (0..1).
  double mean = 1;
  // 95% Wilson score interval for the accuracy (0..1). The dashboard shows this
  // range, never the bare mean.
  double range_low = 2;
  double range_high = 3;
  // Distinct ReadyMCAT question cards with at least one graded review (the
  // number of first attempts; drives the give-up rule).
  uint32 attempts = 4;
  // First-attempt hits (first graded review graded Good/Easy).
  uint32 hits = 5;
  // True when there are enough first attempts to show a score
  // (>= 30 attempts).
  bool meets_data_threshold = 6;
  // Per-AAMC-category performance breakdown (sorted by category id).
  repeated TopicPerformance topics = 7;
}

message TopicPerformance {
  // AAMC category id, e.g. "1A".
  string category = 1;
  string name = 2;
  double topic_weight = 3;
  // First attempts on this topic's question cards.
  uint32 attempts = 4;
  // First-attempt hits on this topic's question cards.
  uint32 hits = 5;
  // hits / attempts (0..1); 0 when there are no attempts.
  double accuracy = 6;
}

// A documented, HEURISTIC projection onto the real MCAT scaled score (472–528).
// It is deliberately uncalibrated: the PRD notes readiness needs calibration
// data the app does not yet have, so `heuristic` is always true and the
// dashboard must label it as an uncalibrated projection, never a real score.
message ReadinessReport {
  // Heuristic projected scaled score on the 472–528 MCAT scale.
  double point = 1;
  // Likely range on the 472–528 scale (propagated from the performance and
  // memory intervals, widened for uncovered exam weight).
  double range_low = 2;
  double range_high = 3;
  // The [0,1] ability blend behind the projection
  // (0.6 * performance + 0.4 * memory), exposed so the number is explainable.
  double ability = 4;
  // True when BOTH the memory and performance give-up rules are met (readiness
  // is only projected when both of its inputs have enough evidence).
  bool meets_data_threshold = 5;
  // Always true: this is an uncalibrated heuristic, never a calibrated score.
  bool heuristic = 6;
}
